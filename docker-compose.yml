services:
  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailpit:
    image: axllent/mailpit:v1.20
    ports:
      - "1025:1025"
      - "8025:8025"

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: xiaochengxu
      POSTGRES_PASSWORD: dev-local
      POSTGRES_DB: xiaochengxu
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xiaochengxu -d xiaochengxu"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Full stack — run with `docker compose --profile app up`.
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    profiles: ["app"]
    environment:
      API_PORT: "3000"
      REDIS_URL: redis://redis:6379
      DATABASE_URL: ${DATABASE_URL:-postgres://xiaochengxu:dev-local@postgres:5432/xiaochengxu}
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_FROM: alerts@xiaochengxu.local
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev-internal-secret}
      WECHAT_APPID: ${WECHAT_APPID:-}
      WECHAT_SECRET: ${WECHAT_SECRET:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:3000/health')
          .then(r => r.ok ? 0 : process.exit(1))
          .catch(() => process.exit(1))"
      interval: 5s
      timeout: 3s
      retries: 10

  jobs:
    build:
      context: .
      dockerfile: services/jobs/Dockerfile
    profiles: ["app"]
    environment:
      REDIS_URL: redis://redis:6379
      API_BASE_URL: http://api:3000
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_FROM: alerts@xiaochengxu.local
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev-internal-secret}
      MONITOR_TICK_INTERVAL_MS: "300000"
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  # One-shot smoke test: exits 0 if the happy path works end-to-end.
  # Run: `docker compose --profile app --profile smoke up --abort-on-container-exit smoke`
  smoke:
    image: curlimages/curl:8.10.1
    profiles: ["smoke"]
    depends_on:
      api:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        set -e
        echo "1) POST /api/auth/anonymous"
        TOKEN=$$(curl -sf -X POST http://api:3000/api/auth/anonymous | sed -E 's/.*"token":"([^"]+)".*/\1/')
        test -n "$$TOKEN"
        echo "   token=$${TOKEN:0:8}…"
        echo "2) POST /api/query-tasks"
        TASK=$$(curl -sf -X POST http://api:3000/api/query-tasks \
          -H "Authorization: Bearer $$TOKEN" -H "Content-Type: application/json" \
          -d '{"tool":"infringement_check","input":"nike"}' \
          | sed -E 's/.*"taskId":"([^"]+)".*/\1/')
        test -n "$$TASK"
        echo "   taskId=$$TASK"
        echo "3) GET /api/stats"
        curl -sf -H "Authorization: Bearer $$TOKEN" http://api:3000/api/stats
        echo ""
        echo "smoke OK"

volumes:
  postgres_data:
